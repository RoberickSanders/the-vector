[pytest]
# --timeout=30 caps any single test at 30 seconds. Without this, an infinite
# loop in a test (or a missed network mock) hangs the whole pytest session
# and forces ctrl-C / kill -9. We hit this with test_icypeas's POLL_INTERVAL=0
# bug: `elapsed += 0` never grew, so the loop spun forever consuming the
# mocked side_effect's StopIteration via a bare except.
#
# --timeout-method=thread lets the timeout reach into blocking syscalls
# (requests.post, time.sleep, smtplib) — the default 'signal' method
# only fires between Python statements.
addopts = --timeout=30 --timeout-method=thread -p no:cacheprovider
testpaths = tests
